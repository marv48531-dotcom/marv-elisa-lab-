<label for="fname"></label><div><input autocomplete="name" type="text" placeholder="Enter Firstname" class="name" id="fname" name="fname" required>

<br>Gender<br><div>
Male<input type="radio" name="Male"required>
Female<input type="radio" name="Male"required>
Others<input type="radio" name="Male"required>

<div><input type="date" class="input" required></div>

<div><input type='password' placeholder='Enter Password' class='input' id="pword" required></div>

<div><input type="tel" class='it' id="phone" placeholder="Phone number" required></div>

<div><label for="country" style="opacity:40%;">Choose Your Place Of Origin</label>

	</option>

	Kiev, Ukraine	
	</option>
	<option

	value="london,united kingdom">London, United Kingdom</option>

		Kingston, Jamaica
	</option>

	<option value="UAE">Dubai, UAE</option>
</select></div>

<div><input type='email' placeholder='Input Email' class='input' id="email" required></div>

<div><input type='password' placeholder='Confirm Password' class='input' id="pass" required></div>

<div><button class='i' required>SignUp</button></div>

<footer>

	<script type="text/javascript">
		function getConfirmation(){
			var retval = confirm('Already Have An Account ?, Please, click OK To Login ');
			if(retval==true){
				window.open(' LOGIN.html');
				return true;
			}else{
				document.write('<h1/><center/Please Sign Up To Continue !!');
				return false;
			}
		}
	</script>
